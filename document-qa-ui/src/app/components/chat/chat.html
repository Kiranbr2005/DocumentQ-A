<mat-card class="chat-card">
  <mat-card-header>
    <mat-icon mat-card-avatar>smart_toy</mat-icon>
    <mat-card-title>Ask Your Document</mat-card-title>
    <mat-card-subtitle>
  Session: {{ docService.getSessionId() | slice:0:8 }}...
  <span *ngIf="activeDocName" class="active-doc-badge">
    <mat-icon style="font-size:14px;height:14px;width:14px">
      description
    </mat-icon>
    {{ activeDocName }}
  </span>
</mat-card-subtitle>

    <div style="margin-left: auto; display: flex; gap: 4px;">
      <!-- Clear chat messages only -->
      <button mat-icon-button
              (click)="clearChat()"
              matTooltip="Clear chat messages">
        <mat-icon>delete_sweep</mat-icon>
      </button>
      <!-- Clear session + all documents -->
      <button mat-icon-button color="warn"
              (click)="clearSession()"
              matTooltip="Clear all documents for this session">
        <mat-icon>delete_forever</mat-icon>
      </button>
    </div>
  </mat-card-header>

  <mat-card-content>
    <div class="messages-container">

      <!-- Empty state -->
      <div *ngIf="messages.length === 0" class="empty-state">
        <mat-icon>forum</mat-icon>
        <p>Ask anything about your uploaded document!</p>
      </div>

      <!-- Messages -->
      <div *ngFor="let msg of messages"
           [class]="'message ' + msg.role">
        <div class="bubble">
          <mat-icon class="msg-icon">
            {{ msg.role === 'user' ? 'person' : 'smart_toy' }}
          </mat-icon>
          <div class="content">
            <p>{{ msg.text }}</p>
            <span class="time">{{ msg.time }}</span>
          </div>
        </div>
      </div>

      <!-- Loading -->
      <div *ngIf="loading" class="message ai">
        <div class="bubble">
          <div class="content thinking">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Scroll anchor -->
      <div #messagesEnd></div>

    </div>
  </mat-card-content>

  <mat-card-actions>
    <mat-form-field appearance="outline" style="flex: 1">
      <mat-label>Ask a question...</mat-label>
      <input matInput
             [(ngModel)]="question"
             (keydown)="onKeyDown($event)"
             [disabled]="loading"
             placeholder="e.g. summarize document" />
    </mat-form-field>
    <button mat-fab color="primary"
            [disabled]="!question.trim() || loading"
            (click)="send()">
      <mat-icon>send</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
