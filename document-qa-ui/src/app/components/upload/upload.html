<mat-card>
  <mat-card-header>
    <mat-icon mat-card-avatar>upload_file</mat-icon>
    <mat-card-title>Upload Document</mat-card-title>
    <mat-card-subtitle>Upload a PDF or TXT file to ask questions about it</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <!-- Drop Zone -->
    <div class="drop-zone" (dragover)="onDragOver($event)" (drop)="onDrop($event)"
      (click)="!uploading && fileInput.click()">
      <mat-icon class="upload-icon">cloud_upload</mat-icon>
      <p *ngIf="!selectedFile">Drag & drop a PDF here or click to browse</p>
      <p *ngIf="selectedFile" class="file-name">
        <mat-icon>insert_drive_file</mat-icon>
        {{ selectedFile.name }}
      </p>
      <input #fileInput type="file" accept=".pdf,.txt" (change)="onFileSelected($event)" hidden />
    </div>

    <mat-progress-bar *ngIf="uploading" mode="indeterminate" style="margin-top: 16px">
    </mat-progress-bar>

    <!-- Success Message -->
    @if(uploadDone){
    <div class="success-box">
      <mat-icon color="primary">check_circle</mat-icon>
      <span>Document processed! Ready to answer questions.</span>
    </div>
    }
  </mat-card-content>

  <mat-card-actions>
  <button mat-raised-button color="primary"
        [disabled]="!selectedFile || uploading || uploadDone"
        (click)="upload()">
  <mat-icon>upload</mat-icon>
  {{ uploading ? 'Processing...' : 'Upload Document' }}
</button>

    @if(uploadDone){
    <button mat-raised-button color="accent" (click)="goToChat()">
      <mat-icon>chat</mat-icon>
      Start Chatting
    </button>
  }
  </mat-card-actions>
</mat-card>
